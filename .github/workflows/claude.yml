name: Claude Code
on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # RESTRICTION: Only the Repo Owner can trigger Claude to save your Pro credits
    if: |
      (contains(github.event.comment.body, '@claude') || 
       contains(github.event.issue.title, '@claude') || 
       contains(github.event.issue.body, '@claude') ||
       contains(github.event.review.body, '@claude')) &&
      (github.event.comment.author_association == 'OWNER' || 
       github.event.issue.author_association == 'OWNER' || 
       github.event.review.author_association == 'OWNER')
    runs-on: ubuntu-latest
    
    # --- THIS BLOCK FIXES THE "ENVIRONMENT VARIABLE" BUG ---
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    # -------------------------------------------------------

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Project
        run: |
          npm install
          npx prisma generate
          npx prisma migrate deploy
          npm run dev:daemon & 

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          # We pass it here as an input AND above as an env var to be 100% sure
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: |
            --dangerously-skip-permissions
            --append-system-prompt "The project is already set up. Server at localhost:3000. Use sqlite3 or playwright as needed."
            --mcp-config '{"mcpServers":{"playwright":{"command":"npx","args":["-y","@playwright/mcp@latest","--allowed-origins","localhost:3000;cdn.tailwindcss.com;esm.sh"]}}}'
            --allowedTools "Bash(npm:*),Bash(sqlite3:*),mcp__playwright__browser_navigate,mcp__playwright__browser_click,mcp__playwright__browser_type,mcp__playwright__browser_take_screenshot,mcp__playwright__browser_wait_for_load_state"